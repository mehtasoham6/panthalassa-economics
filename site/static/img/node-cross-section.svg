<svg viewBox="0 0 400 510" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Inter', system-ui, sans-serif;">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#1a4a6b"/>
    </marker>
    <marker id="arr-sm" markerWidth="6" markerHeight="4.5" refX="5" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#999"/>
    </marker>
    <marker id="arr-heat" markerWidth="6" markerHeight="4.5" refX="5" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Sky background -->
  <rect x="0" y="0" width="400" height="192" fill="#e4f3f8"/>

  <!-- Ocean background -->
  <rect x="0" y="192" width="400" height="318" fill="#b6dde8"/>

  <!-- Ocean surface wave -->
  <path d="M0,190 Q25,182 50,190 Q75,198 100,190 Q125,182 150,190 Q175,198 200,190 Q225,182 250,190 Q275,198 300,190 Q325,182 350,190 Q375,198 400,190 L400,194 Q375,202 350,194 Q325,186 300,194 Q275,202 250,194 Q225,186 200,194 Q175,202 150,194 Q125,186 100,194 Q75,202 50,194 Q25,186 0,194 Z" fill="#0e7c8a" opacity="0.8"/>

  <!-- Spar tube (below waterline) -->
  <rect x="196" y="192" width="8" height="222" rx="1" fill="#0a6575"/>

  <!-- Base plate / anchor -->
  <rect x="190" y="410" width="20" height="5" rx="2" fill="#0a6575"/>
  <ellipse cx="200" cy="415" rx="20" ry="5" fill="#085060"/>

  <!-- Mooring lines -->
  <line x1="200" y1="415" x2="158" y2="450" stroke="#8cb4be" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="200" y1="415" x2="242" y2="450" stroke="#8cb4be" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="200" y="465" text-anchor="middle" fill="#6a9aa8" font-size="9">mooring</text>

  <!-- Hull cylindrical body (above waterline) -->
  <!-- Bottom ellipse (at waterline) -->
  <ellipse cx="200" cy="193" rx="30" ry="10" fill="#1689a0" stroke="#0e7c8a" stroke-width="1.5"/>
  <!-- Side walls -->
  <rect x="170" y="130" width="60" height="63" fill="#1a9aab" stroke="#0e7c8a" stroke-width="1.5"/>
  <!-- Top ellipse -->
  <ellipse cx="200" cy="130" rx="30" ry="10" fill="#56c1cf" stroke="#0e7c8a" stroke-width="1.5"/>
  <!-- Redraw bottom ellipse on top of walls for clean overlap -->
  <ellipse cx="200" cy="193" rx="30" ry="10" fill="#1689a0" stroke="#0e7c8a" stroke-width="1.5"/>

  <!-- Hull contents labels -->
  <text x="200" y="149" text-anchor="middle" fill="white" font-size="9.5" font-weight="600" letter-spacing="0.2">GPU Payload</text>
  <line x1="178" y1="157" x2="222" y2="157" stroke="rgba(255,255,255,0.35)" stroke-width="0.5"/>
  <text x="200" y="169" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8.5">Power Conditioning</text>
  <text x="200" y="182" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8.5">Generator / PTO</text>

  <!-- Wave energy arrows -->
  <line x1="25" y1="150" x2="158" y2="150" stroke="#1a4a6b" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="25" y1="164" x2="158" y2="164" stroke="#1a4a6b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="20" y="146" text-anchor="end" fill="#1a4a6b" font-size="11" font-style="italic" font-family="Georgia, serif">P</text>
  <text x="21" y="152" text-anchor="start" fill="#1a4a6b" font-size="7.5" font-style="italic" font-family="Georgia, serif">wave</text>

  <!-- Waterline label -->
  <text x="8" y="188" fill="#0a7080" font-size="9" font-weight="600">— waterline</text>

  <!-- Hull height bracket (right side) -->
  <line x1="244" y1="130" x2="244" y2="193" stroke="#aaa" stroke-width="1" stroke-dasharray="2.5,2"/>
  <line x1="240" y1="130" x2="248" y2="130" stroke="#aaa" stroke-width="1.2"/>
  <line x1="240" y1="193" x2="248" y2="193" stroke="#aaa" stroke-width="1.2"/>
  <text x="250" y="165" fill="#888" font-size="9">~20 m</text>

  <!-- Depth bracket (right side) -->
  <line x1="244" y1="193" x2="244" y2="414" stroke="#aaa" stroke-width="1" stroke-dasharray="2.5,2"/>
  <line x1="240" y1="414" x2="248" y2="414" stroke="#aaa" stroke-width="1.2"/>
  <text x="250" y="308" fill="#888" font-size="9">~80 m</text>

  <!-- Heat rejection dashed arrow -->
  <line x1="230" y1="215" x2="315" y2="238" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,2.5" marker-end="url(#arr-heat)"/>
  <text x="320" y="242" fill="#c0392b" font-size="9">heat → seawater</text>

  <!-- Turbine label -->
  <line x1="193" y1="360" x2="148" y2="360" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr-sm)"/>
  <text x="144" y="364" text-anchor="end" fill="#6a8a95" font-size="9">turbine / PTO</text>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">Panthalassa-Class Node — Cross-Section</text>
  <text x="200" y="35" text-anchor="middle" fill="#777" font-size="9.5">Spar-buoy wave energy converter with compute payload (schematic)</text>

  <!-- Inset data table -->
  <rect x="10" y="432" width="174" height="72" rx="5" fill="white" stroke="#0e7c8a" stroke-width="1.5" opacity="0.96"/>
  <text x="97" y="447" text-anchor="middle" fill="#0e7c8a" font-size="10.5" font-weight="700">Node Parameters</text>
  <line x1="18" y1="452" x2="176" y2="452" stroke="#0e7c8a" stroke-width="0.5" opacity="0.4"/>

  <text x="18" y="465" fill="#777" font-size="9.5">Rating</text>
  <text x="176" y="465" text-anchor="end" fill="#1a1a1a" font-size="9.5" font-family="'JetBrains Mono', monospace" id="svg-node-rating">3.00 MW</text>

  <text x="18" y="480" fill="#777" font-size="9.5">Capture Width</text>
  <text x="176" y="480" text-anchor="end" fill="#1a1a1a" font-size="9.5" font-family="'JetBrains Mono', monospace" id="svg-capture-width">107 m</text>

  <text x="18" y="495" fill="#777" font-size="9.5">Fleet Sea Area</text>
  <text x="176" y="495" text-anchor="end" fill="#1a1a1a" font-size="9.5" font-family="'JetBrains Mono', monospace" id="svg-sea-area">148 km²</text>
</svg>
